<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Question mark number -->
  <text x="64" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="64" fill="white" opacity="0.95">?</text>
  <!-- Green light dot -->
  <circle cx="96" cy="28" r="14" fill="#22c55e"/>
  <circle cx="96" cy="28" r="8" fill="#4ade80"/>
  <!-- Yellow light dot -->
  <circle cx="62" cy="112" r="10" fill="#eab308"/>
  <circle cx="62" cy="112" r="6" fill="#facc15"/>
</svg>
